name: Weekly Blog Generator

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      blog_mode:
        description: "LLM backend: openai or ollama"
        required: false
        default: "openai"
        type: choice
        options:
          - openai
          - ollama
      blog_days:
        description: "Number of days to look back (default: 7)"
        required: false
        default: "7"
      blog_date:
        description: "Override output date (YYYY-MM-DD, default: today UTC)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --upgrade pip

      - name: Generate weekly blog post
        env:
          BLOG_MODE: ${{ github.event.inputs.blog_mode || 'openai' }}
          BLOG_DAYS: ${{ github.event.inputs.blog_days || '7' }}
          BLOG_DATE: ${{ github.event.inputs.blog_date || '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_weekly_blog.py

      - name: Check for changes
        id: changes
        run: |
          git add blog/ .blog_state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: blog/weekly-update-${{ github.run_id }}
          base: main
          commit-message: "blog: add weekly update"
          title: "📝 Weekly Blog Update"
          body: |
            This PR was automatically generated by the weekly blog workflow.

            It contains a new blog post under `blog/` summarising the week's
            activity in `logs/`, along with an updated `.blog_state.json`.

            Please review the post and merge when satisfied.
          labels: automated,blog
          delete-branch: true
