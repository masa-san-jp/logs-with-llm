name: Weekly Blog Generator

on:
  schedule:
    - cron: '0 9 * * 5'  # 毎週金曜 9:00 UTC
  workflow_dispatch:
    inputs:
      llm_provider:
        description: "LLM provider: openai or anthropic"
        required: false
        default: "openai"
        type: choice
        options:
          - openai
          - anthropic
      blog_days:
        description: "Number of days to look back"
        required: false
        default: "7"
      blog_date:
        description: "Override output date (YYYY-MM-DD)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate weekly blog
        env:
          LLM_PROVIDER: ${{ inputs.llm_provider || 'openai' }}
          BLOG_DAYS: ${{ inputs.blog_days || '7' }}
          BLOG_DATE: ${{ inputs.blog_date || '' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-20250514' }}
        run: python scripts/generate_weekly_blog.py

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet blog/; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "📝 Weekly blog post"
          title: "📝 Weekly Blog Post"
          body: |
            This PR contains the automatically generated weekly blog post.

            Please review the content before merging.
          branch: weekly-blog-${{ github.run_id }}
          delete-branch: true
