name: Weekly Documentation Goal Issue

on:
  schedule:
    - cron: '0 9 * * 5'  # 毎週金曜 9:00 UTC
  workflow_dispatch:
    inputs:
      llm_provider:
        description: "LLM provider: openai or anthropic"
        required: false
        default: "openai"
        type: choice
        options:
          - openai
          - anthropic
      issue_date:
        description: "Override issue date (YYYY-MM-DD)"
        required: false
        default: ""

permissions:
  contents: read
  issues: write

jobs:
  create-goal-issue:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate issue prompt
        env:
          ISSUE_DATE: ${{ inputs.issue_date || '' }}
        run: python scripts/generate_weekly_goal_issue.py > /tmp/issue_prompt.txt

      - name: Call LLM to generate issue content
        id: llm
        env:
          LLM_PROVIDER: ${{ inputs.llm_provider || 'openai' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-20250514' }}
        run: |
          python - <<'EOF'
          import json
          import os
          import urllib.request
          from pathlib import Path

          provider = os.environ.get("LLM_PROVIDER", "openai").lower()
          prompt = Path("/tmp/issue_prompt.txt").read_text(encoding="utf-8")

          if provider == "anthropic":
              api_key = os.environ.get("ANTHROPIC_API_KEY", "")
              model = os.environ.get("ANTHROPIC_MODEL", "claude-sonnet-4-20250514")
              if not api_key:
                  raise RuntimeError("ANTHROPIC_API_KEY is not set")

              payload = json.dumps({
                  "model": model,
                  "max_tokens": 4096,
                  "messages": [{"role": "user", "content": prompt}],
              }).encode()

              req = urllib.request.Request(
                  "https://api.anthropic.com/v1/messages",
                  data=payload,
                  headers={
                      "Content-Type": "application/json",
                      "x-api-key": api_key,
                      "anthropic-version": "2023-06-01",
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=120) as resp:
                  body = json.loads(resp.read())
              content = body["content"][0]["text"]
          else:
              api_key = os.environ.get("OPENAI_API_KEY", "")
              base_url = os.environ.get("OPENAI_BASE_URL", "https://api.openai.com/v1").rstrip("/")
              model = os.environ.get("OPENAI_MODEL", "gpt-4o-mini")
              if not api_key:
                  raise RuntimeError("OPENAI_API_KEY is not set")

              payload = json.dumps({
                  "model": model,
                  "messages": [{"role": "user", "content": prompt}],
                  "temperature": 0.7,
              }).encode()

              req = urllib.request.Request(
                  f"{base_url}/chat/completions",
                  data=payload,
                  headers={
                      "Content-Type": "application/json",
                      "Authorization": f"Bearer {api_key}",
                  },
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=120) as resp:
                  body = json.loads(resp.read())
              content = body["choices"][0]["message"]["content"]

          Path("/tmp/issue_content.md").write_text(content, encoding="utf-8")
          EOF

      - name: Parse issue title and body
        id: parse
        run: |
          TITLE=$(grep -m1 '^# ' /tmp/issue_content.md | sed 's/^# //')
          if [ -z "$TITLE" ]; then
            echo "Failed to extract issue title"
            cat /tmp/issue_content.md
            exit 1
          fi
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          tail -n +2 /tmp/issue_content.md > /tmp/issue_body.md

      - name: Check for existing issue
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="${{ steps.parse.outputs.title }}"
          EXISTING=$(gh issue list --state open --json title --jq '.[].title')
          if echo "$EXISTING" | grep -qF "$TITLE"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Issue
        if: steps.check.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "${{ steps.parse.outputs.title }}" \
            --body-file /tmp/issue_body.md
