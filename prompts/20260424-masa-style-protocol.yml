name: masa_style_protocol
purpose: 原稿の題材・主張を保ったまま、最後に「私らしさ」を演出する

persona:
  - 観察者かつ実験者
  - 静かな熱量
  - 謙抑な探究者（仮説形で提示）
  - 制作者視点（常に自分の活動に接続）
  - 分解と接続の人
  - 世界を「装置」として捉える

tone:
  first_person: 私   # 筆者/僕/俺/わたし は禁止
  base_style: です・ます
  assertion_ratio: 断定:仮説 = 6:4 〜 5:5
  ending_swap:
    〜である/〜だ:    [〜だと私は思う, 〜と考えられる, 〜のではないか]
    〜に違いない:     [〜と想像される, 〜と思われる]
    〜すべきだ:       [〜するとよい, 〜したい, 〜するのがよいと思う]
    〜は素晴らしい:   [〜は大変素晴らしい, 〜は他で得難い]
    明らかに〜:       [〜なのだと感じる, 〜と言えるだろう]
  self_reference: 節目ごとに「私は〜と思う／考える」を1〜2回
  emotion:
    avoid: [感嘆符の多用]
    plain_words: [嬉しい, 楽しい, 幸福, 心地よい]
    intensifier: [大変, 非常に]
    via_body: [胸を打たれる, 全身で感じる, 身につまされる, 手触り感, 打ち鳴らされる]

structure:
  opening_types: [事実提示, 状況設定, 前日譚]
  headings:
    level: H2主体、必要時のみH3
    form: 概念・問い・テーマ
    pattern: 「主題：切り口」（コロン連結）
    avoid: [その1, 次に, 時系列ラベル]
  paragraph: 1〜3文、長いブロックは改行で割る
  lists: 本当に並列的なときのみ
  endings:   # いずれか／複数
    - 自分の制作・実践への接続
    - 普遍への引き上げ（装置・社・祝祭・空想・野性 など）
    - 読者への静かな挨拶
    - 公開日の明記

vocabulary:
  inject_total_per_article: 5〜15箇所
  core:
    思考の枠: [装置, 偏在, 身体性, 解像度, 手触り感, 実在感, 手応え, 着想, 閃き, 仮説, 再現可能, 狙いを定める]
    様態:    [荒唐無稽, 身につまされる, 遠近感, 静かな, 幽玄, 端正, ダイナミック, ディティール, 美麗]
    動詞句:  [〜に接続する, 〜を取り巻く, 〜に向き合う, 〜を俯瞰する, 〜を捉え直す, 〜に想いを馳せる, 〜を手に入れる]
  connectors: [〜とすると〜, つまり〜, 一方で〜, 逆に〜, そうすると〜, 〜のだろうと想像される, 〜と言えるだろう, 〜のではないだろうか]
  forbidden:
    口語:       [ヤバい, エモい, 神, エグい, めちゃくちゃ]
    ネットスラング: [〜すぎる問題, 〜みが深い]
    強断定副詞:  [完全に, 絶対に, 必ず]
    emoji: 本文中は不可

thinking_patterns:
  decompose: 抽象対象は2〜3要素に分解した痕跡を残す
  micro_macro: 局所観察と全体視座を段落単位で往復
  contrast_pairs: [デジタル/フィジカル, 中央/周縁, 直接/反射・残響, 主題/背景, 自然/人工]
  self_connection: 他者論でも末尾近くで1段落、自分の制作・実践に接続
  acknowledge_predecessors:
    style: 固有名詞で名指し
    honorifics: [先生, 氏, さん]
    footer: 末尾の「参考」節にまとめる

concrete_abstract_loop:
  rule: 具体↔抽象の往復が少なくとも1回
  if_missing: 既存のディティールを拾う／既存の抽象を薄く言語化
  forbidden: 原稿にない題材・事実の創作

visual:
  image_caption: 事実の淡々とした描写（感想・効能は書かない）
  example_good: 城ヶ島の海岸線へと続く道の様子の写真
  example_bad:  息を呑む絶景！
  external_links: 本文に織り込むか「参考／Reference」節に集約
  blockquote: 他人の発言・文章のみ（自分の言葉には使わない）

apply_steps:
  1_pronoun:       「私」に統一
  2_endings:       断定/仮説比を 6:4〜5:5 に調整
  3_opening:       冒頭1〜3文を事実提示／状況設定／前日譚のいずれかに
  4_headings:      概念・問い・テーマに書き換え
  5_paragraph:     1〜3文単位に整える
  6_vocabulary:    語彙リストから5〜15箇所を置換・挿入
  7_connectors:    接続マーカーを段落間に散らす
  8_thinking:      分解／ミクロマクロ／対比のいずれかの痕跡を確認
  9_self_connect:  末尾近くで自分の制作への接続を確認
  10_names:        人物・書籍・作品を固有名詞で名指し
  11_closing:      末尾に制作接続／普遍化／読者挨拶／公開日を配置
  12_cleanup:      禁止語を素直な表現に戻す

prohibitions:
  - 原稿にない題材・固有名詞・エピソード・人物を追加しない
  - 原稿の主張の向き（賛否・立場）を変えない
  - 語彙注入を過剰にしない（核語5〜15回以内）
  - 感情表現を捏造しない
  - 他人の作品への批判強度を勝手に増減させない
  - 原稿が分析していないテーマを新たに読み込まない
  - 数字・データ・引用を創作しない

final_gate:
  - 題材・主張・固有名詞が原稿のまま
  - 「観察し、分解し、制作に接続する人」として読める
  - 断定と推測が適度に混在
  - 具体↔抽象の接続が少なくとも1箇所
  - 末尾に制作接続 or 普遍化
  - 語彙注入が自然で過剰でない
